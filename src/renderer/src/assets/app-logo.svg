<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B5080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E0D5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5F0EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8A020;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.4" />

  <!-- Marble tile grid (4 tiles) -->
  <g transform="translate(34, 34)">
    <!-- Top-left tile -->
    <rect x="0" y="0" width="58" height="58" rx="4" fill="url(#stone)" opacity="0.95" />
    <!-- Marble veins top-left -->
    <path d="M5 10 Q20 25 35 15 Q50 5 58 20" stroke="#B8A898" stroke-width="1" fill="none" opacity="0.6" />
    <path d="M10 40 Q25 50 45 38 Q55 32 58 45" stroke="#C4B4A4" stroke-width="0.8" fill="none" opacity="0.5" />

    <!-- Top-right tile -->
    <rect x="74" y="0" width="58" height="58" rx="4" fill="url(#stone)" opacity="0.85" />
    <path d="M80 15 Q90 30 110 20 Q125 12 132 28" stroke="#B0A090" stroke-width="1" fill="none" opacity="0.5" />
    <path d="M76 42 Q95 52 115 40 Q128 34 132 50" stroke="#C0B0A0" stroke-width="0.8" fill="none" opacity="0.45" />

    <!-- Bottom-left tile -->
    <rect x="0" y="74" width="58" height="58" rx="4" fill="url(#stone)" opacity="0.80" />
    <path d="M8 84 Q22 96 40 88 Q52 82 58 96" stroke="#B8A898" stroke-width="1" fill="none" opacity="0.5" />
    <path d="M2 112 Q18 124 38 114 Q50 108 58 118" stroke="#C4B4A4" stroke-width="0.8" fill="none" opacity="0.4" />

    <!-- Bottom-right tile (darker granite) -->
    <rect x="74" y="74" width="58" height="58" rx="4" fill="#2A2A2A" opacity="0.90" />
    <!-- Granite speckles -->
    <circle cx="90" cy="88" r="1.5" fill="#666" opacity="0.8" />
    <circle cx="105" cy="82" r="1" fill="#888" opacity="0.7" />
    <circle cx="118" cy="92" r="1.5" fill="#555" opacity="0.8" />
    <circle cx="96" cy="100" r="1" fill="#777" opacity="0.7" />
    <circle cx="115" cy="105" r="1.5" fill="#666" opacity="0.8" />
    <circle cx="88" cy="115" r="1" fill="#888" opacity="0.7" />
    <circle cx="108" cy="118" r="1.5" fill="#555" opacity="0.8" />
    <circle cx="125" cy="115" r="1" fill="#777" opacity="0.7" />
    <circle cx="100" cy="126" r="1.5" fill="#666" opacity="0.8" />

    <!-- Grout lines -->
    <rect x="62" y="0" width="8" height="132" rx="2" fill="url(#bg)" opacity="0.9" />
    <rect x="0" y="62" width="132" height="8" rx="2" fill="url(#bg)" opacity="0.9" />
  </g>

  <!-- Gold accent ring overlay -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3" />

  <!-- Central badge -->
  <circle cx="100" cy="100" r="28" fill="url(#bg)" />
  <circle cx="100" cy="100" r="28" fill="none" stroke="url(#gold)" stroke-width="2" />

  <!-- SMG initials -->
  <text x="100" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#gold)" letter-spacing="1">SMG</text>
</svg>
