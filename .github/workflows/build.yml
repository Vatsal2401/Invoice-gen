name: Build Distributables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist/*.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + TypeScript)
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST-Invoice-Generator-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          retention-days: 30
